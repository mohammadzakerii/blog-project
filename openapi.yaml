
openapi: 3.0.3

info:
  title: Blog API
  version: 1.0.0

servers:
  - url: http://localhost:8000/ 
         

paths:
  /account/list/:
    get:

      security:
        - BearerAuth: []

      summary: returns list of users

      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized 
  /account/register/:
    post:

      summary: creates a new user

      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullname:
                  type: string
                password:
                  type: string
                password2:
                  type: string
                phone:
                  type: string
                email:
                  type: string 
                required:
                  - phone
                  - password
                  - password2   

      responses:
        '201':
          description: Created
        '400':
          description: Required fields are not provided or passwords are not the same 
        '403':
          description: Forbidden  
          


  /account/login_user/:
    post:

      security:
        - BearerAuth: []

      summary: returns jwt access and refresh tokens 

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: your phone number
                password:
                  type: string
                  example: your password
              required:
                - name
                - password

      responses:
        '200':
          description: Success
        '400':
          description: Already Authenticated
        '404':
          description: Not found

  /account/register/login/otp/:
    post:

      summary: returns code 

      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string

      responses:
        '200':
          description: Success
        '403':
          description: Authenticated user cant login or register
        '429':
          description: wait for 2 minutes to request again or daily limit reached   


  /account/check/otp/: 
    post:

      summary: returns jwt tokens
      
      security:
        - BearerAuth: []

      parameters:
        - name: token
          in: header
          required: true
          schema:
            type: string


      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string

      responses:
        '200':
          description: Success
        '400':
          description: Token not provided / invalid token/ invalid code/ otp expired
        '429':
          description: too many attemps wait for 2 minutes to request again

            
                       
  /account/detail/{pk}/:
    get:

      summary: retrieves an individual user object

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success
        '404':
          description: Not found

    put:

      summary: updates an individual user/ permission is needed

      security:
        - BearerAuth: []

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                password:
                  type: string
                password2:
                  type: string
                fullname:
                  type: string
                email:
                  type: string 

              required:
                - phone
                - password          

      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Not allowed  
        '404':
          description: Not found

    delete:
      summary: removes an indiviual user object permission is needed 

      security:
        - BearerAuth: []

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Not allowed
        '404':
          description: Not found

  /account/refresh_access_token/:

    summary: returns a new access token
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string

      responses:
        '200':
          description: Success
        '401':
          description: Expired or invalid refresh token 
        '404':
          description: User not found    

  /account/logout_user/:

    post:
      summary: logout user 

      security:
        - BearerAuth: []

      responses:
        '200':
          description: Success
        '401': 
          description: Unauthorized
        '405':
          description: Method not allowed     




  /blog/category/:
    get:
      summary: returns a list of categories
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: 
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id: 
                          type: integer
                        category_name:
                          type: string
                        created_at:
                          type: string    
                 

        



    post:
      security:
        - BearerAuth: []

      summary: create category

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name  

      responses:
        '201':  
          description: Created
          content:
            application/json:
              schema:
                type:  object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  created:
                    type: string   
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: not authenticated
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: you dont have permission 

  /blog/category/detail/{pk}/:
    get:
      summary: to get an individual category object

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer
         
      responses: 
        '200':
          description: a json indiviual  object of category
          content: 
            application/json:
              schema:
                type: object  
                properties:
                  id:
                    type: integer
                  category_name:
                    type: string
        '404':
          description: object not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found
    put:

      security:
        - BearerAuth: []
      summary: to update an individual category object

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                 

      responses:
        '200':
          description: post updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  content:
                    type: string


        '404':
          description: Not found 
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: post object not found  

    delete:
      security:
        - BearerAuth: []

      summary: to delete an individual object of category

      parameters:
        - name: pk
          in: path
          reuired: true
          schema:
            type: integer 

      responses:
        '200':
          description: deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: deleted successfully

        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not authenticated

        '404':
          description: Not found
          content:
            application/json:
              schema: 
                type: object
                properties:
                  error:
                    type: string
                    example: Not found            

                                                                         



  /blog/post/:
    get:
      summary: returns all posts

      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        content:
                          type: string
        '404':
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not found

    post:
      security:
        - BearerAuth: []

      summary: creates a post object

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                category:
                  type: array
                  items:
                    type: integer
                image:
                  type: string
                  format: binary 
                active:
                  type: boolean
      responses:
        '201':
          description: Created successfully
        '401':
          description: Not authenticated
        '403':
          description: Permission denied                         
  

      # requestBody:
      #   required: true
      #   content:
      #     application/json:
      #       schema:
      #         type: object
      #         properties:
      #           title:
      #             type: string
      #           content:
      #             type: string
      #           image:
      #             type:   

                

      # responses:
      #   '201"':
      #     description: Created 
          
      #   '401':
      #     description: Unauthorized
          

      #   '403':
      #     description: You dont have permission
          

  /blog/post_detail/{pk}/:
    get: 
    
      summary: returns an individual post object

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success

        '404':
          description: Not found
    post:

      security:
        - BearerAuth: []

      summary: updates an individual post object/ Authorization and admin permission are required

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer 

      requestBody:
        required: true
        content:
          multipart/form-data:
           schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                category:
                  type: array
                  items:
                    type: integer
                image:
                  type: string
                  format: binary 
                active:
                  type: boolean
      responses:
        '200':
          description:  Updated successfully
        '401':
          description: Not authenticated
        '403':
          description: Permission denied
        '404':
          description: Post not found                           
       

      
    delete:

      security:
        - BearerAuth: []

      summary: removes an individual post object

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not found   


  /blog/comment_post/{pk}/:
    get:

      summary: returns all comments of an individual post

      parameters:
          - name: pk
            in: path
            required: true
            schema:
              type: integer 

      responses:
        '200':
          description: Success
        '404':
          description: Not found

    post: 

      security:
        - BearerAuth: []

      summary: creates a comment for an individual post

      parameters:
          - name: pk
            in: path
            required: true
            schema:
              type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string

      responses:
        '201':
          description: Created
        '401': 
          description: Unauthorized
        '404': 
          description: Post not found

  /blog/comment_detail/{pk}/:
    get:
      summary: to gat an individual comment by its pk

      parameters:
          - name: pk
            in: path
            required: true
            schema:
              type: integer

      responses:
        '200':
          description: Success
        '404':
          description: Not found

    put:
      summary: updates an individual comment object

      security:
        - BearerAuth: []

      parameters:
          - name: pk
            in: path
            required: true
            schema:
              type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string        

      responses:
        '201':
          description: Created
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      summary: removes an individual comment object 

      security:
        - BearerAuth: []

      parameters:
          - name: pk
            in: path
            required: true
            schema:
              type: integer

      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden  
        '404':
          description: Not found 

  /blog/reply_comment/{pk}/:
    get:
      summary: returns list of replies of an individual comment

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success
        '404':
          description: Not found

    post:
      summary: creates reply related to an individual comment

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema: object
            properties:
              body:
                type: string      

      responses:
        '201':
          description: Created
        '401': 
          description: Unauthorized
        '404':
          description: Parrent comment not found   

  /blog/likes/list/{pk}/:
    get:
      summary: returns a list of likes related to an individual post

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success
        '404':
          description: Post not found                                     

  /blog/like/{pk}/:
    post:
      summary: creates a like if it doesnt exist or delete like object if it exists

      security:
        - BearerAuth: []

      parameters:
        - name: pk
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Post not found  

  /blog/search/:
    get:
      summary: to search about title or content of a post

      parameters:
        - name: search
          in: query
          schema:
            type: string
            
        - name: page
          in: query
          schema:
            type: integer

      responses:
        '200': 
          description: Success     


















         
                            
          
                        
                                


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT                          
                            




                               